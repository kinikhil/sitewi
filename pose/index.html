<!DOCTYPE html>
<html>
<head>
    <title>MyPo Capture Pose</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        body { margin: 0; text-align: center; font-family: sans-serif; background: #111; color: #fff; }
        #output { width: 100vw; height: 100vh; object-fit: contain; }
        #controls { position: absolute; bottom: 20px; width: 100%; z-index: 10; }
        #countdownOverlay { 
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            background: rgba(0,0,0,0.9); font-size: 20vw; display: flex; 
            align-items: center; justify-content: center; z-index: 20; display: none;
        }
        #playbackArea { background: #000; padding: 20px; }
        .high-contrast { filter: invert(1) hue-rotate(180deg) brightness(2); }
        button { padding: 15px 30px; font-size: 1.2rem; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>

    <div id="countdownOverlay">5</div>
    <video id="input" style="display:none;" playsinline></video>
    <canvas id="output"></canvas>
    
    <div id="controls">
        <button id="playBtn" disabled>Play Capture</button>
        <button id="restartBtn">Capture</button>
    </div>
    
    <div id="playbackArea"></div>

    <script>
        const video = document.getElementById('input'), canvas = document.getElementById('output');
        const ctx = canvas.getContext('2d'), playBtn = document.getElementById('playBtn');
        const countdownOverlay = document.getElementById('countdownOverlay');
        const playbackArea = document.getElementById('playbackArea');
        
        let frames = [], captureCount = 0, camera, isRecording = false;

        const pose = new Pose({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`});
        pose.setOptions({modelComplexity: 1, smoothLandmarks: true});

        function drawBody(lm) {
            ctx.strokeStyle = '#CCFF00'; ctx.lineWidth = 2; 
            const draw = (i, j) => {
                ctx.beginPath();
                ctx.moveTo(lm[i].x * canvas.width, lm[i].y * canvas.height);
                ctx.lineTo(lm[j].x * canvas.width, lm[j].y * canvas.height);
                ctx.stroke();
            };

            ctx.beginPath(); ctx.ellipse(lm[0].x * canvas.width, lm[0].y * canvas.height, 15, 20, 0, 0, 2 * Math.PI); ctx.stroke();
            const midX = (lm[11].x + lm[12].x) / 2 * canvas.width, midY = (lm[11].y + lm[12].y) / 2 * canvas.height;
            ctx.beginPath(); ctx.moveTo(lm[0].x * canvas.width, lm[0].y * canvas.height); ctx.lineTo(midX, midY); ctx.stroke();

            draw(11, 12); draw(11, 13); draw(13, 15); draw(15, 17);
            draw(12, 14); draw(14, 16); draw(16, 18); draw(11, 23); 
            draw(12, 24); draw(23, 24); draw(23, 25); draw(25, 27); 
            draw(27, 29); draw(29, 31); draw(24, 26); draw(26, 28); 
            draw(28, 30); draw(30, 32);
        }

        async function startProcess() {
            if(camera) await camera.stop();
            frames = []; captureCount = 0;
            countdownOverlay.style.display = 'flex';
            let count = 5;
            countdownOverlay.innerText = count;
            const timer = setInterval(() => {
                if (--count < 0) {
                    clearInterval(timer);
                    countdownOverlay.style.display = 'none';
                    isRecording = true;
                } else {
                    countdownOverlay.innerText = count;
                }
            }, 1000);

            // Using facingMode: 'environment' to target the rear camera
            camera = new Camera(video, {
                onFrame: async () => await pose.send({image: video}),
                width: 640, 
                height: 480,
                facingMode: 'environment' 
            });
            camera.start();
        }

        pose.onResults((results) => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (!results.poseLandmarks) return;
            drawBody(results.poseLandmarks);
            
            if (isRecording && captureCount < 40 && (Date.now() % 50 < 10)) { 
                frames.push(canvas.toDataURL());
                captureCount++;
                if (captureCount === 40) {
                    isRecording = false; camera.stop(); playBtn.disabled = false;
                }
            }
        });

        document.getElementById('restartBtn').onclick = startProcess;
        playBtn.onclick = () => {
            playbackArea.classList.add('high-contrast');
            playbackArea.scrollIntoView({ behavior: 'smooth', block: 'center' });
            let i = 0;
            const interval = setInterval(() => {
                playbackArea.innerHTML = `<img src="${frames[i]}" style="width:100%; border: 2px solid #CCFF00;">`;
                if (++i >= frames.length) clearInterval(interval);
            }, 200);
        };
    </script>
</body>
</html>
