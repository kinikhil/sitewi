<!DOCTYPE html>
<html>
<head>
    <title>MyPo Capture Pose</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        body { text-align: center; font-family: sans-serif; background: #f9f9f9; }
        #output { border: 4px solid #2E8B57; background-color: #000; border-radius: 8px; }
        #controls { margin: 20px; }
        #playbackArea { margin-top: 20px; min-height: 480px; transition: scroll 0.3s; }
    </style>
</head>
<body>
    <h1>MyPo Capture Pose</h1>
    <video id="input" style="display:none;"></video>
    <canvas id="output" width="640" height="480"></canvas>
    
    <div id="controls">
        <button id="playBtn" disabled>Play MyPo Pose</button>
        <button id="restartBtn">Restart MyPo Capture</button>
        <p id="status">Click "Restart MyPo Capture" to begin.</p>
    </div>
    
    <div id="playbackArea"></div>

    <script>
        const video = document.getElementById('input'), canvas = document.getElementById('output');
        const ctx = canvas.getContext('2d'), playBtn = document.getElementById('playBtn');
        const status = document.getElementById('status'), playbackArea = document.getElementById('playbackArea');
        
        let frames = [], captureCount = 0, camera, isRecording = false, countdown = 10;

        const pose = new Pose({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`});
        pose.setOptions({modelComplexity: 1, smoothLandmarks: true});

        function drawBody(lm) {
            ctx.strokeStyle = '#CCFF00'; ctx.lineWidth = 4;
            const draw = (i, j) => {
                ctx.beginPath();
                ctx.moveTo(lm[i].x * 640, lm[i].y * 480);
                ctx.lineTo(lm[j].x * 640, lm[j].y * 480);
                ctx.stroke();
            };

            // Head & Neck
            ctx.beginPath(); ctx.ellipse(lm[0].x * 640, lm[0].y * 480, 20, 30, 0, 0, 2 * Math.PI); ctx.stroke();
            const midX = (lm[11].x + lm[12].x) / 2 * 640, midY = (lm[11].y + lm[12].y) / 2 * 480;
            ctx.beginPath(); ctx.moveTo(lm[0].x * 640, lm[0].y * 480); ctx.lineTo(midX, midY); ctx.stroke();

            // Skeleton
            draw(11, 12); draw(11, 13); draw(13, 15); draw(15, 17);
            draw(12, 14); draw(14, 16); draw(16, 18); draw(11, 23); 
            draw(12, 24); draw(23, 24); draw(23, 25); draw(25, 27); 
            draw(27, 29); draw(29, 31); draw(24, 26); draw(26, 28); 
            draw(28, 30); draw(30, 32);
        }

        async function startProcess() {
            if(camera) await camera.stop();
            countdown = 10; isRecording = false; playBtn.disabled = true; frames = [];
            const timer = setInterval(() => {
                status.innerText = `Starting in ${countdown}...`;
                if (--countdown < 0) {
                    clearInterval(timer);
                    isRecording = true; captureCount = 0;
                    status.innerText = "Recording... (0/40)";
                }
            }, 1000);
            camera = new Camera(video, {onFrame: async () => await pose.send({image: video}), width: 640, height: 480});
            camera.start();
        }

        pose.onResults((results) => {
            ctx.clearRect(0, 0, 640, 480);
            if (!results.poseLandmarks) return;
            drawBody(results.poseLandmarks);
            
            if (isRecording && captureCount < 40 && (Date.now() % 50 < 10)) { 
                frames.push(canvas.toDataURL());
                captureCount++;
                status.innerText = `Recording: ${captureCount}/40`;
                if (captureCount === 40) {
                    isRecording = false;
                    camera.stop();
                    status.innerText = "Capture Complete.";
                    playBtn.disabled = false;
                }
            }
        });

        document.getElementById('restartBtn').onclick = startProcess;
        playBtn.onclick = () => {
            playbackArea.scrollIntoView({ behavior: 'smooth', block: 'center' });
            let i = 0;
            const interval = setInterval(() => {
                playbackArea.innerHTML = `<img src="${frames[i]}" style="border: 2px solid #2E8B57;">`;
                if (++i >= frames.length) clearInterval(interval);
            }, 200);
        };
    </script>
</body>
</html>
